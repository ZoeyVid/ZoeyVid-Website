<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="The projects overview of ZoeyVid" />
    <title>Projects - ZoeyVid</title>
    <link href="/assets/css/output.css" rel="stylesheet">
    <script src="/assets/js/htmlReader.js"></script>
    <script src="/assets/js/elements.js"></script>
    <link rel="icon" type="image/webp" href="/images/ZoeyVid-PB.webp">
    <script src="/assets/js/github.js"></script>
</head>

<body class="bg-[#296236]">
    <div id="navbar">
        <script>
            readHTML("navbar", "/assets/elements/navbar.html")
        </script>
    </div>
    <noscript>
        <style type="text/css">
            .pagecontainer {
                display: none;
            }

            body {
                background-color: black;
                color: white;
            }

            .noscriptmsg {
                margin: 0;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        </style>
        <div class="noscriptmsg">
            Please enable Javascript. You need it to visit this site!
        </div>
    </noscript>
    <div id="Projekte" class="pr-4 pl-4 grid lg:grid-cols-2 lg:gap-2 sm:grid-cols-1 sm:gap-1">
        <template id="repoTemplate">
            <a class='text-white repo-link'>
                <div class='bg-gray-800 rounded-lg p-4 m-2'>
                    <h1 class='text-2xl font-bold hover:underline repo-title'></h1>
                    <p class='text-gray-300 repo-description'></p>
                    <p class='text-gray-400 text-sm repo-spdx-id'></p>
                    <div class='pt-2 repo-topics'></div>
                </div>
            </a>
        </template>
        <template id="topicTemplate">
            <span class='bg-gray-700 rounded-lg px-3 py-1 text-sm font-semibold text-gray-300 mr-2 my-4 topic text-nowrap'></span>
        </template>
        <script>getAllRepos()</script>
    </div>
    <div id="footer">
        <script>
            readHTML("footer", "/assets/elements/footer.html")
        </script>
    </div>
</body>

</html>
